<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 3000" preserveAspectRatio="xMidYMid slice">

    <defs>

        <!-- Azul profundo -->
        <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">

            <stop offset="0%" stop-color="#0a1020"></stop>

            <stop offset="45%" stop-color="#0f1730"></stop>

            <stop offset="100%" stop-color="#08141d"></stop>

        </linearGradient>

    </defs>

    <rect width="100%" height="100%" fill="url(#bgGradient)"></rect>

</svg>